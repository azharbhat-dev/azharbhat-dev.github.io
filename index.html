<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 432px;
    max-height: 768px;
    background: #4ec0ca;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    text-align: center;
    color: #fff;
  }
  .overlay.show { pointer-events: auto; }
  .title {
    font-size: 52px;
    font-weight: 900;
    color: #ffeb3b;
    text-shadow:
      -3px -3px 0 #553100, 3px -3px 0 #553100,
      -3px 3px 0 #553100, 3px 3px 0 #553100,
      0 6px 8px rgba(0,0,0,0.5);
    letter-spacing: 3px;
    margin-bottom: 30px;
  }
  .getReady {
    font-size: 36px;
    font-weight: 900;
    color: #ff7e00;
    text-shadow:
      -2px -2px 0 #fff, 2px -2px 0 #fff,
      -2px 2px 0 #fff, 2px 2px 0 #fff,
      0 4px 6px rgba(0,0,0,0.5);
    margin-bottom: 18px;
    letter-spacing: 2px;
  }
  .tapHint {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    margin-bottom: 22px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  .goTitle {
    font-size: 44px;
    font-weight: 900;
    color: #ff4136;
    text-shadow:
      -3px -3px 0 #fff, 3px -3px 0 #fff,
      -3px 3px 0 #fff, 3px 3px 0 #fff,
      0 5px 6px rgba(0,0,0,0.5);
    letter-spacing: 3px;
    margin-bottom: 18px;
  }
  .board {
    background: #ded895;
    border: 4px solid #543D00;
    border-radius: 10px;
    padding: 16px 28px;
    margin-bottom: 18px;
    color: #543D00;
    box-shadow: inset -3px -3px 0 #b3a76d, 0 4px 0 #543D00;
    min-width: 190px;
  }
  .board .lbl {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .board .val {
    font-size: 34px;
    font-weight: 900;
    line-height: 1;
    margin: 4px 0 10px 0;
  }
  .board .bestLbl {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a34a00;
  }
  .board .bestVal {
    font-size: 26px;
    font-weight: 900;
    line-height: 1;
    margin-top: 2px;
  }
  button {
    background: linear-gradient(to bottom, #ffeb3b 0%, #fbc02d 100%);
    border: 3px solid #543D00;
    color: #543D00;
    font-size: 17px;
    font-weight: 900;
    padding: 11px 30px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 4px 0 #543D00, inset -2px -2px 0 rgba(0,0,0,0.15);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  button:hover { filter: brightness(1.05); }
  button:active { transform: translateY(4px); box-shadow: 0 0 0 #543D00; }
  .credit {
    position: absolute;
    bottom: 6px; left: 0; right: 0;
    text-align: center;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    text-shadow: 1px 1px 2px #000, -1px -1px 1px #000;
    z-index: 5;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
  .goCredit {
    margin-top: 12px;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    text-shadow: 1px 1px 2px #000, -1px -1px 1px #000;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="startScreen" class="overlay show">
    <div class="title">FLAPPY BIRD</div>
    <div class="getReady">GET READY</div>
    <div class="tapHint">▶ TAP TO START ◀</div>
    <button id="startBtn">START</button>
  </div>

  <div id="gameOverScreen" class="overlay" style="display:none;">
    <div class="goTitle">GAME OVER</div>
    <div class="board">
      <div class="lbl">Score</div>
      <div class="val" id="finalScore">0</div>
      <div class="bestLbl">Best</div>
      <div class="bestVal" id="bestScore">0</div>
    </div>
    <button id="restartBtn">RESTART</button>
    <div class="goCredit">Developed by Azhar Muhammad Bhat</div>
  </div>

  <div class="credit">Developed by Azhar Muhammad Bhat</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 288;
  const H = 512;
  canvas.width = W;
  canvas.height = H;

  const GROUND_H = 80;
  const PLAY_H = H - GROUND_H;

  const GRAVITY = 0.32;
  const FLAP_V = -6.2;
  const MAX_FALL = 10;
  const PIPE_SPEED = 1.6;
  const PIPE_W = 52;
  const PIPE_GAP = 110;
  const PIPE_INTERVAL = 170;
  const PIPE_MIN_TOP = 50;
  const PIPE_MAX_TOP = PLAY_H - PIPE_GAP - 80;
  const BIRD_X = 70;
  const BIRD_R = 10;

  const STATE = { READY: 0, PLAYING: 1, DYING: 2, DEAD: 3 };

  const $ = id => document.getElementById(id);
  const startScreen = $('startScreen');
  const gameOverScreen = $('gameOverScreen');
  const startBtn = $('startBtn');
  const restartBtn = $('restartBtn');
  const finalScoreEl = $('finalScore');
  const bestScoreEl = $('bestScore');
  const wrap = $('wrap');

  const game = {
    state: STATE.READY,
    bird: { x: BIRD_X, y: PLAY_H / 2, vy: 0, rot: 0, frame: 0, frameTimer: 0 },
    pipes: [],
    ground: 0,
    score: 0,
    best: 0,
    frame: 0,
    flash: 0,
    shake: 0
  };

  try { game.best = parseInt(localStorage.getItem('fb_best') || '0', 10) || 0; } catch(e) {}

  const sounds = {
    click: null,
    crash: null,
    crashPlayed: false
  };

  function initSounds() {
    try {
      sounds.click = new Audio('click.mp3');
      sounds.click.preload = 'auto';
      sounds.click.volume = 0.6;
      sounds.crash = new Audio('crash.mp3');
      sounds.crash.preload = 'auto';
      sounds.crash.volume = 0.7;
    } catch(e) {}
  }

  function playClick() {
    if (!sounds.click) return;
    try {
      sounds.click.currentTime = 0;
      const p = sounds.click.play();
      if (p && p.catch) p.catch(() => {});
    } catch(e) {}
  }

  function playCrash() {
    if (!sounds.crash || sounds.crashPlayed) return;
    try {
      sounds.crashPlayed = true;
      sounds.crash.currentTime = 0;
      const p = sounds.crash.play();
      if (p && p.catch) p.catch(() => {});
    } catch(e) {}
  }

  initSounds();

  function resetGame() {
    game.bird.x = BIRD_X;
    game.bird.y = PLAY_H / 2;
    game.bird.vy = 0;
    game.bird.rot = 0;
    game.bird.frame = 0;
    game.bird.frameTimer = 0;
    game.pipes = [];
    game.score = 0;
    game.flash = 0;
    game.shake = 0;
    sounds.crashPlayed = false;
    spawnPipe(W + 80);
    spawnPipe(W + 80 + PIPE_INTERVAL);
  }

  function spawnPipe(x) {
    const topH = PIPE_MIN_TOP + Math.random() * (PIPE_MAX_TOP - PIPE_MIN_TOP);
    game.pipes.push({ x: x, topH: topH, scored: false });
  }

  function flap() {
    game.bird.vy = FLAP_V;
    game.bird.rot = -0.5;
    playClick();
  }

  function startGame() {
    resetGame();
    game.state = STATE.PLAYING;
    startScreen.style.display = 'none';
    startScreen.classList.remove('show');
    gameOverScreen.style.display = 'none';
    gameOverScreen.classList.remove('show');
    flap();
  }

  function die() {
    if (game.state !== STATE.PLAYING) return;
    game.state = STATE.DYING;
    game.flash = 1;
    game.shake = 8;
    playCrash();
    if (game.score > game.best) {
      game.best = game.score;
      try { localStorage.setItem('fb_best', String(game.best)); } catch(e) {}
    }
  }

  function showGameOver() {
    game.state = STATE.DEAD;
    finalScoreEl.textContent = game.score;
    bestScoreEl.textContent = game.best;
    gameOverScreen.style.display = 'flex';
    gameOverScreen.classList.add('show');
  }

  function update() {
    game.frame++;
    const b = game.bird;

    if (game.state !== STATE.DEAD) {
      game.ground = (game.ground + PIPE_SPEED) % 24;
    }

    b.frameTimer++;
    if (b.frameTimer >= 5) {
      b.frame = (b.frame + 1) % 3;
      b.frameTimer = 0;
    }

    if (game.state === STATE.READY) {
      b.y = PLAY_H / 2 + Math.sin(game.frame / 12) * 6;
      b.rot = 0;
      return;
    }

    if (game.state === STATE.PLAYING) {
      b.vy = Math.min(b.vy + GRAVITY, MAX_FALL);
      b.y += b.vy;

      if (b.vy < 0) {
        b.rot = Math.max(-0.5, b.rot - 0.08);
      } else {
        b.rot = Math.min(Math.PI / 2, b.rot + 0.06);
      }

      for (let i = 0; i < game.pipes.length; i++) game.pipes[i].x -= PIPE_SPEED;

      while (game.pipes.length && game.pipes[0].x + PIPE_W < -10) {
        game.pipes.shift();
      }

      const last = game.pipes[game.pipes.length - 1];
      if (last && last.x < W - PIPE_INTERVAL) {
        spawnPipe(last.x + PIPE_INTERVAL);
      }

      for (const p of game.pipes) {
        if (!p.scored && p.x + PIPE_W < b.x) {
          p.scored = true;
          game.score++;
        }
      }

      if (b.y + BIRD_R >= PLAY_H) {
        b.y = PLAY_H - BIRD_R;
        die();
        return;
      }
      if (b.y - BIRD_R <= 0) {
        b.y = BIRD_R;
        b.vy = 0;
      }

      for (const p of game.pipes) {
        if (b.x + BIRD_R > p.x && b.x - BIRD_R < p.x + PIPE_W) {
          if (b.y - BIRD_R < p.topH || b.y + BIRD_R > p.topH + PIPE_GAP) {
            die();
            return;
          }
        }
      }
    }

    if (game.state === STATE.DYING) {
      b.vy = Math.min(b.vy + GRAVITY * 1.3, MAX_FALL + 2);
      b.y += b.vy;
      b.rot = Math.min(Math.PI / 2, b.rot + 0.15);

      if (b.y + BIRD_R >= PLAY_H) {
        b.y = PLAY_H - BIRD_R;
        b.vy = 0;
        showGameOver();
      }
    }

    if (game.flash > 0) game.flash = Math.max(0, game.flash - 0.12);
    if (game.shake > 0) game.shake = Math.max(0, game.shake - 1);
  }

  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, PLAY_H);
    sky.addColorStop(0, '#4ec0ca');
    sky.addColorStop(1, '#7dd5c0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, PLAY_H);

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    drawCloud(40, 70, 0.9);
    drawCloud(180, 100, 1.1);
    drawCloud(240, 50, 0.8);
    drawCloud(100, 150, 1);

    ctx.fillStyle = '#5ca94a';
    ctx.fillRect(0, PLAY_H - 50, W, 50);
    ctx.fillStyle = '#4a8a3a';
    for (let i = 0; i < 5; i++) {
      const x = (i * 70 - (game.frame * 0.3) % 70);
      drawBush(x, PLAY_H - 50);
    }
    ctx.fillStyle = '#8ed760';
    ctx.fillRect(0, PLAY_H - 15, W, 15);
  }

  function drawCloud(x, y, s) {
    ctx.beginPath();
    ctx.arc(x, y, 12*s, 0, Math.PI*2);
    ctx.arc(x+14*s, y-4*s, 15*s, 0, Math.PI*2);
    ctx.arc(x+30*s, y, 12*s, 0, Math.PI*2);
    ctx.arc(x+16*s, y+6*s, 11*s, 0, Math.PI*2);
    ctx.fill();
  }

  function drawBush(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI*2);
    ctx.arc(x+20, y-5, 22, 0, Math.PI*2);
    ctx.arc(x+42, y, 18, 0, Math.PI*2);
    ctx.fill();
  }

  function drawPipeBody(x, y, h) {
    if (h <= 0) return;
    const g = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
    g.addColorStop(0, '#5a9a3a');
    g.addColorStop(0.1, '#73c043');
    g.addColorStop(0.3, '#a6e55a');
    g.addColorStop(0.45, '#d4f78a');
    g.addColorStop(0.6, '#a6e55a');
    g.addColorStop(0.85, '#73c043');
    g.addColorStop(1, '#3a7a2a');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, PIPE_W, h);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(x + PIPE_W - 4, y, 4, h);
    ctx.fillStyle = '#2d5a1e';
    ctx.fillRect(x, y, 1, h);
    ctx.fillRect(x + PIPE_W - 1, y, 1, h);
  }

  function drawPipeCap(x, y) {
    const w = PIPE_W + 6;
    const h = 26;
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, '#5a9a3a');
    g.addColorStop(0.1, '#73c043');
    g.addColorStop(0.3, '#b5ec6a');
    g.addColorStop(0.5, '#e0ff9a');
    g.addColorStop(0.7, '#b5ec6a');
    g.addColorStop(0.9, '#73c043');
    g.addColorStop(1, '#3a7a2a');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#2d5a1e';
    ctx.fillRect(x, y, w, 1);
    ctx.fillRect(x, y + h - 1, w, 1);
    ctx.fillRect(x, y, 1, h);
    ctx.fillRect(x + w - 1, y, 1, h);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x + w - 4, y, 4, h);
  }

  function drawPipes() {
    for (const p of game.pipes) {
      const bottomY = p.topH + PIPE_GAP;
      const bottomH = PLAY_H - bottomY;
      drawPipeBody(p.x, 0, p.topH - 26);
      drawPipeCap(p.x - 3, p.topH - 26);
      drawPipeBody(p.x, bottomY + 26, bottomH - 26);
      drawPipeCap(p.x - 3, bottomY);
    }
  }

  function drawGround() {
    const g = ctx.createLinearGradient(0, PLAY_H, 0, H);
    g.addColorStop(0, '#ded895');
    g.addColorStop(1, '#c4b86d');
    ctx.fillStyle = g;
    ctx.fillRect(0, PLAY_H, W, GROUND_H);

    ctx.fillStyle = '#5ca94a';
    ctx.fillRect(0, PLAY_H, W, 4);
    ctx.fillStyle = '#8ed760';
    ctx.fillRect(0, PLAY_H - 4, W, 4);

    ctx.fillStyle = '#c9a86a';
    const offset = game.ground;
    for (let i = -1; i < W / 24 + 2; i++) {
      const x = i * 24 - offset;
      ctx.fillRect(x, PLAY_H + 12, 22, 6);
      ctx.fillRect(x + 12, PLAY_H + 24, 22, 6);
      ctx.fillRect(x, PLAY_H + 36, 22, 6);
    }

    ctx.fillStyle = '#a68850';
    for (let i = -1; i < W / 12 + 2; i++) {
      const x = i * 12 - offset * 0.8;
      ctx.fillRect(x, PLAY_H + 50, 3, 3);
      ctx.fillRect(x + 6, PLAY_H + 58, 3, 3);
    }

    ctx.fillStyle = '#543D00';
    ctx.fillRect(0, PLAY_H + 4, W, 1);
  }

  function drawBird() {
    const b = game.bird;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);

    const wingOffsets = [-3, 0, 3];
    const wingY = wingOffsets[b.frame];

    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 0, 15, 11, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#f7d51d';
    ctx.beginPath();
    ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#f7a81d';
    ctx.beginPath();
    ctx.ellipse(-1, 3, 9, 4, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(-3, wingY, 7, 4.5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-3, wingY, 5.5, 3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ececec';
    ctx.beginPath();
    ctx.ellipse(-3, wingY + 0.5, 4.5, 2, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(5, -3, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(6.5, -3, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(7, -3.6, 0.8, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.fillRect(9, -2, 9, 7);
    ctx.fillStyle = '#ff8c1a';
    ctx.fillRect(10, -1, 8, 5);
    ctx.fillStyle = '#d96a00';
    ctx.fillRect(10, 2, 8, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(10, 1, 8, 1);

    ctx.restore();
  }

  function drawScore() {
    if (game.state === STATE.READY || game.state === STATE.DEAD) return;
    const text = String(game.score);
    ctx.font = '900 32px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    ctx.strokeText(text, W / 2, 30);
    ctx.fillText(text, W / 2, 30);
  }

  function drawFlash() {
    if (game.flash > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + game.flash + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    ctx.save();
    if (game.shake > 0) {
      const sx = (Math.random() - 0.5) * game.shake;
      const sy = (Math.random() - 0.5) * game.shake;
      ctx.translate(sx, sy);
    }
    drawBackground();
    drawPipes();
    drawGround();
    drawBird();
    drawScore();
    drawFlash();
    ctx.restore();
  }

  let lastTime = 0;
  const FRAME_MS = 1000 / 60;
  let accumulator = 0;

  function loop(time) {
    if (!lastTime) lastTime = time;
    const delta = Math.min(time - lastTime, 100);
    lastTime = time;
    accumulator += delta;

    let steps = 0;
    while (accumulator >= FRAME_MS && steps < 5) {
      update();
      accumulator -= FRAME_MS;
      steps++;
    }

    render();
    requestAnimationFrame(loop);
  }

  resetGame();

  function handleTap(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (game.state === STATE.READY) {
      startGame();
    } else if (game.state === STATE.PLAYING) {
      flap();
    }
  }

  wrap.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    handleTap(e);
  });

  wrap.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    handleTap(e);
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (game.state === STATE.DEAD) {
        startGame();
      } else {
        handleTap();
      }
    }
  });

  startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    e.preventDefault();
    startGame();
  });

  restartBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    e.preventDefault();
    startGame();
  });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
